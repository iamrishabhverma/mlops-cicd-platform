apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-api
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-api
  template:
    metadata:
      labels:
        app: ml-api
    spec:
      containers:
        - name: ml-api
          image: iamrishabhverma/ml-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
            