name: ML CI/CD
'on':
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Train ML model
        working-directory: ./api
        run: |
          pip install scikit-learn
          pip install -r requirements.txt 
          python model/train.py
          cp model/model.pkl model.pkl
      - name: Login to Docker Hub
        run: >
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{
          secrets.DOCKERHUB_USER }}" --password-stdin
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/ml-api:latest ./api
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USER }}/ml-api:latest
      - name: ArgoCD Sync
        run: echo "ArgoCD sync would be triggered here."
      - name: Get source branch name
        id: get_branch
        run: echo "branch_name=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV   
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
            - type: section
              text:
                type: mrkdwn
                text: "✅ *ML API built & deployed successfully!*\n\n📝 *Commit:* ${{ github.event.head_commit.message }}"
            - type: section
              fields:
                - type: mrkdwn
                  text: "*Repository:*\n${{ github.repository }}"
                - type: mrkdwn
                  text: "*Branch:*\n${{ env.branch_name }}"
                - type: mrkdwn
                  text: "*Committer:*\n${{ github.event.head_commit.author.name }}"
                - type: mrkdwn
                  text: "*Commit ID:*\n<${{ github.event.head_commit.url }}|${{ github.event.head_commit.id }}}>"
